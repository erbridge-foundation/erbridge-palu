# Run erbridge-palu locally as a standalone service (e.g. to point a dev
# machine or the wormhole mapper at it). It has no auth — keep it on a trusted
# network; the port below binds to localhost only.
#
# By default it downloads the live SDE from CCP. To run fully offline against
# the checked-in test fixture instead, uncomment PALU_SDE_DIR and the
# fixture volume mount below (handy for HURL/manual testing without a download).
services:
  palu:
    build: .
    ports:
      # Drop the `127.0.0.1:` prefix to share it on a trusted network.
      - "127.0.0.1:5001:5001"
    environment:
      RUST_LOG: "info"
      PALU_CACHE_DIR: "/var/cache/erbridge-palu"
      # All settings have sane defaults; uncomment to override.
      # PALU_PORT: "5001"
      # PALU_SDE_RELOAD_INTERVAL_SECS: "3600"   # 0 disables
      # PALU_EVE_SCOUT_INTERVAL_SECS: "600"     # 0 disables
      #
      # Offline fixture mode (no CCP/EVE-Scout downloads):
      # PALU_SDE_DIR: "/fixture"
      # PALU_EVE_SCOUT_INTERVAL_SECS: "0"
    volumes:
      # Persist the SDE cache so restarts skip the re-download.
      - palu-cache:/var/cache/erbridge-palu
      # For offline fixture mode, expose the fixture build dir read-only:
      # - ./tests/fixtures/sde/1:/fixture:ro
    restart: unless-stopped

volumes:
  palu-cache:
